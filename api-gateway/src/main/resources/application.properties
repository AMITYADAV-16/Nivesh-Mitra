server.port=8082
spring.application.name=api-gateway
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.cloud.gateway.server.webmvc.routes[0].id=user-profile-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://user-profile-service
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/users/**

spring.cloud.gateway.server.webmvc.routes[1].id=risk-profiling-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://risk-profiling-service
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/risk/**

spring.cloud.gateway.server.webmvc.routes[2].id=market-data-service
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://market-data-service
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/market/**

spring.cloud.gateway.server.webmvc.routes[3].id=recommendation-service
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://recommendation-service
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/recommend/**