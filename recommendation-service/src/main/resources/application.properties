spring.application.name=recommendation-service
server.port=8085

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.ai.openai.api-key=${GROQ_API_KEY}
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile

spring.data.redis.host=localhost
spring.data.redis.port=6379

resilience4j.retry.instances.groq-api.max-attempts=3
resilience4j.retry.instances.groq-api.wait-duration=2s

resilience4j.circuitbreaker.instances.groq-api.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.groq-api.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.groq-api.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.groq-api.permitted-number-of-calls-in-half-open-state=2